<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library-2572017</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="1.css">
</head>

<body>
    <div class="container">
        <h1>Personal Library Manager</h1>

        <form id="bookForm">
            <input type="text" id="judul" placeholder="Judul Buku" required>
            <input type="text" id="penulis" placeholder="Nama Penulis" required>
            <input type="number" id="tahun" placeholder="Tahun Penerbit" required>
            <select id="status" required>
                <option value="">-Pilih Status-</option>
                <option value="Belum dibaca">Belum dibaca</option>
                <option value="Sudah dibaca">Sudah dibaca</option>
            </select>
            <button type="submit">Tambah Buku</button>
        </form>


        <div id="bookList" class="book-list"></div>
    </div>

    <script>
        const bookForm = document.getElementById("bookForm");
        let books = [];

        const savedBooks = localStorage.getItem("books");
        if (savedBooks !== null) {
            books = JSON.parse(savedBooks);
        }

        function simpanStorage() {
            const jsonBooks = JSON.stringify(books);
            localStorage.setItem("books", jsonBooks);
        }

        function renderBuku() {

            const bookList = document.getElementById("bookList");
            bookList.innerHTML = "";

            if (books.length === 0) {
                bookList.innerHTML = `<div class="empty">Belum ada buku.</div>`;
                return;
            }

            for (let i = 0; i < books.length; i++) {
                const buku = books[i];


                const card = document.createElement("div");
                card.className = "book-card";

                card.innerHTML = `
                    <div class="book-info">
                        <h3>${buku.judul}</h3>
                        <p>Penulis: ${buku.penulis}</p>
                        <p>Tahun terbit: ${buku.tahun}</p>
                        <p>Status: ${buku.status}</p>
                    </div>
                    <button class="delete-btn" onclick="hapusBuku(${buku.id})">Hapus</button>
                `;
                bookList.appenddChild(card);
            } 
        }



        bookForm.addEventListener("submit", function (event) {
            event.preventDefault();
            const bukuBaru = {
                id: Date.now(),
                judul: document.getElementById("judul").value,
                penulis: document.getElementById("penulis").value,
                tahun: document.getElementById("tahun").value,
                status: document.getElementById("status").value
            };
            books.push(bukuBaru);
            simpanStorage();
            bookForm.reset();
            renderBuku();
        });

        function hapusBuku(idx) {
            if (confirm("Apakah anda yakin mau menghapus buku ini?")) {
                books.splice(idx, 1);

                simpanStorage();
                renderBuku();
            }
        }
        renderBuku();
    </script>

</body>

</html>
